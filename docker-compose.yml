services:
  agents:
    build:
      context: ./apps/agents
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - agent_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - agents
    restart: unless-stopped

  mock-server:
    build:
      context: ./apps/agents
      dockerfile: Dockerfile
    profiles:
      - mock
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./scripts:/app/scripts:ro
    command: ["python", "/app/scripts/test_e2e_mock.py"]
    working_dir: /app

volumes:
  agent_uploads:
